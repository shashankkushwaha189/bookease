<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookEase Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50 flex">
    <div class="w-full max-w-md mx-auto m-8">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-r from-blue-100 to-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-neutral-900 mb-2">HealthFirst Clinic</h2>
                <p class="text-neutral-600">Welcome back! Sign in to continue</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Email Address</label>
                    <input type="email" id="email" value="admin@demo.com" class="w-full px-3 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Password</label>
                    <input type="password" id="password" value="demo123456" class="w-full px-3 py-2 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>

                <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-3">
                    <p class="text-red-600 text-sm"></p>
                </div>

                <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Sign In
                </button>

                <div class="bg-blue-50 rounded-lg p-4">
                    <p class="text-xs text-blue-800 font-medium mb-2">Demo Credentials:</p>
                    <div class="space-y-1">
                        <p class="text-xs text-blue-700">
                            <span class="font-medium">Email:</span> admin@demo.com
                        </p>
                        <p class="text-xs text-blue-700">
                            <span class="font-medium">Password:</span> demo123456
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');
        const errorMsg = errorDiv.querySelector('p');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('https://bookease-api.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-ID': 'b18e0808-27d1-4253-aca9-453897585106'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Show success
                    loginBtn.textContent = 'Success! Redirecting...';
                    loginBtn.classList.add('bg-green-600');
                    
                    // Redirect to dashboard (you'll need to create this)
                    setTimeout(() => {
                        alert('Login successful! Token: ' + data.token.substring(0, 50) + '...');
                    }, 1000);
                } else {
                    throw new Error(data.error?.message || 'Login failed');
                }
            } catch (error) {
                errorMsg.textContent = error.message || 'Login failed. Please try again.';
                errorDiv.classList.remove('hidden');
                loginBtn.textContent = 'Sign In';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
